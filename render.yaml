services:
  - type: web
    name: stakepoint-api
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGIN
        # Comma-separated list of allowed frontend origins. Add every domain
        # the site is served from (the Vercel project URL, custom domains,
        # any branch alias you still rely on). The server parses on commas
        # and trims whitespace.
        value: https://xenbet.vercel.app,https://stakepoint-client.vercel.app,https://oddsify-client.vercel.app
      - key: CORS_ALLOW_VERCEL
        # Vercel project name whose preview URLs (https://<name>-*.vercel.app)
        # should also be allowed. Prevents redeploying the backend on every
        # frontend preview deployment.
        value: oddsify-client
      - key: ODDS_API_KEY
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
